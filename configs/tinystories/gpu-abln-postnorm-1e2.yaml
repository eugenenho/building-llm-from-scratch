model:
  context_length: 256
  d_model: 512
  vocab_size: null
  num_layers: 4
  num_heads: 16 
  rope_theta: 10000
  d_ff: 1344

training:
  batch_size: 128
  steps: 10000
  warmup_iters: 2000
  cosine_cycle_iters: 10000
  lr_max: 1.0e-2
  lr_min: 1.0e-4
  weight_decay: 0.01
  betas:
    - 0.9
    - 0.95
  adamw_eps: 1.0e-8
  max_l2_norm: 1.0

data:
  train_data_path: data/TinyStoriesV2-GPT4-train-encoded.npy
  val_data_path: data/TinyStoriesV2-GPT4-valid-encoded.npy

tokenizer:
  vocab_path: outputs_tinystories/vocab.json
  merges_path: outputs_tinystories/merges.txt 
  special_tokens: ["<|endoftext|>",]

checkpoint:
  output_dir: checkpoints/tinystories
  run_name: null
  save_every: 100000
  eval_every: 500
  val_iters: 25

ablation:
  use_rms_norm: True
  norm_position: post
  use_rope: True
  ffn_type: swiglu

  