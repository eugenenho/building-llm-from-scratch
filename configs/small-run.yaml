model:
  batch_size: 32
  context_length: 256
  d_model: 512
  num_layers: 4
  num_heads: 16 
  rope_theta: 10000
  d_ff: 1344

training:
  steps: 5000
  warmup_tiers: 250
  cosine_cycle_iters: 5000
  lr_max: 1e-3
  lr_min: 1e-4
  weight_decay: 0.01
  betas:
    - 0.9
    - 0.95
  adamw_eps: 1e-8
  max_grad_norm: 1.0

data:
  train_data_path: data/TinyStoriesV2-GPT4-train-encoded.npy
  valid_data_path: data/TinyStoriesV2-GPT4-valid-encoded.npy

tokenizer:
  vocab_path: outputs_tinystories/vocab.json
  merges_path: outputs_tinystories/merges.txt 
  special_tokens: ["<|endoftext|>",]

checkpoint:
  output_dir: checkpoints/tinystories
  run_name: null
  save_every: 1000
  

  